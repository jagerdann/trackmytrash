<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Login.css">
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <title>Track My Trash - Login</title>
</head>
<body>

    <div id="navbar">
        <a href="HomePage.html"><img src="../img/logo.png" alt="Logo" id="logo"></a>
        <button class="hamburger">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="HomePage.html">Home</a>
            <a href="About.html">About Us</a>
            <a href="ContactUs.html">Contact Us</a>
        </div>
    </div>

    <!-- PWA Install Banner -->
<div id="installBanner" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #0e5125; color: white; padding: 16px; text-align: center; z-index: 1000; font-family: Arial, sans-serif; justify-content: space-between; align-items: center; flex-wrap: wrap;">
  <span style="margin: 5px;">📱 I-install ang Track My Trash app!</span>
  <div style="margin: 5px;">
    <button id="installBtn" style="background: white; color: #0e5125; border: none; padding: 10px 20px; margin-right: 10px; border-radius: 5px; font-weight: bold;">Install</button>
    <button id="dismissBtn" style="background: transparent; color: white; border: 1px solid white; padding: 10px 20px; border-radius: 5px;">Not Now</button>
  </div>
</div>

    <div id="app">
        <div class="form-box">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <p class="signup-link">New to Track My Trash? <a href="Register.html">Sign Up</a></p>
        </div>
    </div>
    
    <script src="../js/script.js"></script>
    <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Service Worker registered:', reg))
      .catch(err => console.log('Service Worker failed:', err));
  });
}
</script>
</body>
</html>
