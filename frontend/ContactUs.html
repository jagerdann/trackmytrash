<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <title>Track My Trash - Contact Us</title>
</head>
<body>

    <div id="navbar">
        <img src="../img/logo.png" alt="Logo" id="logo">
        <div class="hamburger">☰</div>
        <div class="nav-links">
            <a href="HomePage.html">Home</a>
            <a href="AboutUs.html">About Us</a>
            <a href="ContactUs.html">Contact Us</a>
        </div>
    </div>

    <div id="contact-container">
        <h1 id="contact-title">Send Us Feedback</h1>
        
        <div class="contact-wrapper">
            <!-- Contact Info Side -->
            <div class="contact-info">
                <div class="info-card">
                    <div class="info-icon">📍</div>
                    <h3>Address</h3>
                    <p>Quezon City Hall, Diliman, QC</p>
                </div>
                
                <div class="info-card">
                    <div class="info-icon">📞</div>
                    <h3>Hotline</h3>
                    <p>(02) 1234 5678</p>
                </div>
                
                <div class="info-card">
                    <div class="info-icon">✉️</div>
                    <h3>Email</h3>
                    <p>feedback@trackmytrash.com</p>
                </div>
                
                <div class="info-card">
                    <div class="info-icon">⏰</div>
                    <h3>Hours</h3>
                    <p>Mon-Fri: 8AM - 5PM</p>
                </div>
            </div>

            <!-- Feedback Form Side - FIXED with proper IDs -->
            <div class="contact-form">
                <form id="feedbackForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="feedbackName" placeholder="Your name" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="feedbackEmail" placeholder="Your email" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Barangay</label>
                            <select id="feedbackBarangay" required>
                                <option value="" disabled selected>Select barangay</option>
                                <option>Bagong Pag-asa</option>
                                <option>Batasan Hills</option>
                                <option>Commonwealth</option>
                                <option>Fairview</option>
                                <option>Holy Spirit</option>
                                <option>Payatas</option>
                                <option>Tandang Sora</option>
                                <option>U.P. Campus</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Feedback Type</label>
                            <select id="feedbackType" required>
                                <option value="" disabled selected>Select type</option>
                                <option value="compliment">Compliment / Praise</option>
                                <option value="complaint">Complaint</option>
                                <option value="suggestion">Suggestion</option>
                                <option value="question">Question / Report Issue</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="feedbackMessage" rows="3" placeholder="Write your feedback here..." required></textarea>
                    </div>
                    
                    <button type="submit">Send Feedback</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Success Popup (hidden by default) -->
    <div id="successPopup" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0e5125; color: white; padding: 20px 30px; border-radius: 10px; text-align: center; z-index: 2000; font-family: 'Alfa Slab One', serif; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <p>✅ Thank you for your feedback!</p>
        <p style="font-size: 12px; margin-top: 10px;">We appreciate your message.</p>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // Service Worker registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.log('Service Worker failed:', err));
            });
        }

        // Feedback form submission handler (para sure na gumana kahit wala sa script.js)
        document.addEventListener('DOMContentLoaded', function() {
            const feedbackForm = document.getElementById('feedbackForm');
            
            if (feedbackForm) {
                feedbackForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    // Get values using the correct IDs
                    const formData = {
                        name: document.getElementById('feedbackName')?.value || '',
                        email: document.getElementById('feedbackEmail')?.value || '',
                        barangay: document.getElementById('feedbackBarangay')?.value || '',
                        feedback_type: document.getElementById('feedbackType')?.value || '',
                        message: document.getElementById('feedbackMessage')?.value || ''
                    };
                    
                    console.log('Sending feedback:', formData);
                    
                    try {
                        const response = await fetch('https://trackmytrash.onrender.com/api/feedback', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(formData)
                        });
                        
                        const result = await response.json();
                        console.log('Response:', result);
                        
                        if (result.success) {
                            // Show success popup
                            const popup = document.getElementById('successPopup');
                            if (popup) {
                                popup.style.display = 'block';
                                setTimeout(() => {
                                    popup.style.display = 'none';
                                }, 3000);
                            }
                            feedbackForm.reset();
                        } else {
                            alert('Error: ' + (result.message || 'Something went wrong'));
                        }
                    } catch(error) {
                        console.error('Error:', error);
                        alert('Connection error. Please try again later.');
                    }
                });
            }
        });
    </script>
</body>
</html>
